<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>급똥구조대 - 안심 화장실 지도</title>
    <style>
        /* 기본 여백을 제거하고 전체 화면을 사용하도록 설정합니다 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #fcf8f0; /* 배경을 따뜻한 미색으로 설정 */
        }

        /* 화면을 좌우로 나누기 위한 전체 컨테이너 (Flexbox 사용) */
        .container {
            display: flex;
            width: 100%;
            height: 100vh; /* 브라우저 화면의 100% 높이 */
        }

        /* --- 왼쪽 패널 (검색창 + 리스트) --- */
        .left-panel {
            width: 320px; /* 왼쪽 패널의 고정 너비 */
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column; /* 내부 요소들을 위에서 아래로 배치 */
            box-shadow: 2px 0 10px rgba(0,0,0,0.05); /* 패널에 살짝 그림자 추가 */
            z-index: 10;
        }

        /* 급똥구조대 타이틀 배너 */
        .header {
            padding: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00); /* 옐로우-오렌지 그라데이션 */
            color: #333;
            text-align: center;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .search-box {
            padding: 15px;
            background-color: #ffffff;
            display: flex;
            gap: 10px; /* 요소 간 간격 */
        }

        .search-box input {
            flex: 1; /* 남은 가로 공간 차지 */
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px; /* 둥근 모서리 */
            font-size: 14px;
        }

        .search-box button {
            width: 60px;
            padding: 10px;
            background-color: #8b4513; /* 화장실을 상징하는 갈색 */
            color: white;
            border: none;
            border-radius: 8px; /* 둥근 모서리 */
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s; /* 호버 효과 애니메이션 */
        }

        .search-box button:hover {
            background-color: #6a3510; /* 호버 시 더 짙은 갈색 */
        }

        /* 빠른 검색(필터) 버튼 스타일 */
        .quick-filters {
            display: flex;
            gap: 5px;
            padding: 0 15px 15px 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .quick-filters button {
            flex: 1;
            padding: 8px 0;
            background-color: #f1f3f5;
            border: 1px solid #ced4da;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: #495057;
            font-weight: bold;
            transition: all 0.2s;
        }

        .quick-filters button:hover {
            background-color: #e2e6ea;
        }

        /* 검색 결과가 많아지면 스크롤이 생기도록 설정 */
        .result-list {
            flex: 1; /* 남은 세로 공간을 모두 차지함 */
            overflow-y: auto; 
            padding: 0;
            margin: 0;
            list-style: none; /* 리스트 앞에 붙는 점 제거 */
        }

        .result-list li {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer; /* 마우스를 올렸을 때 클릭 가능한 포인터로 변경 */
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: background-color 0.1s; /* 호버 효과 애니메이션 */
        }

        .result-list li:hover {
            background-color: #f8f9fa; /* 마우스를 올렸을 때 배경색 변경 */
        }

        .place-name {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .place-address {
            font-size: 13px;
            color: #666;
        }

        /* --- 오른쪽 패널 (지도) --- */
        .right-panel {
            flex: 1; /* 가로 공간 중 왼쪽 패널이 쓰고 남은 전체를 차지함 */
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 커스텀 말풍선 스타일 */
        .custom_infowindow {
            padding: 10px;
            z-index: 1;
            min-width: 150px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .custom_infowindow strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #8b4513; /* 제목 갈색 */
        }

        .custom_infowindow span {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="header">
                <h1>🆘 급똥구조대</h1>
                <div style="font-size: 12px; opacity: 0.8; margin-top: 3px;">내 주변 가장 가까운 안전지대 🏃💨</div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="검색어 입력" value="공중 화장실">
                <button id="searchBtn">검색</button>
            </div>

            <div class="quick-filters">
                <button id="btnToilet">🚽 공중화장실</button>
                <button id="btnStarbucks">☕ 스타벅스</button>
                <button id="btnMall">🏢 개방 상가</button>
            </div>

            <ul id="placesList" class="result-list">
                <li style="text-align: center; color: #888; font-size: 14px; padding-top: 30px;">
                    위치 권한 허용 후 '검색' 버튼을 눌러보세요!
                </li>
            </ul>
        </div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=076e642420d63b83b006244cd3293772&libraries=services"></script>

    <script>
        // 지도가 완전히 로드된 후에 코드가 실행되도록 감쌉니다.
        kakao.maps.load(function() {
            
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5 
            };  
            const map = new kakao.maps.Map(mapContainer, mapOptions); 

            let userPosition = null; 
            let currentLocationMarker; 
            let currentMeOverlay; 

            // 사용자의 현재 위치 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude; 
                        const lon = position.coords.longitude; 
                        
                        userPosition = new kakao.maps.LatLng(lat, lon);
                        map.setCenter(userPosition);

                        // 내 위치 정확도 원 표시
                        currentLocationMarker = new kakao.maps.Circle({
                            center: userPosition,
                            radius: 100,
                            strokeWeight: 1,
                            strokeColor: '#3d61f7',
                            strokeOpacity: 0.5,
                            fillColor: '#3d61f7',
                            fillOpacity: 0.1
                        });
                        currentLocationMarker.setMap(map);

                        // 내 위치 커스텀 오버레이 (파란 점)
                        currentMeOverlay = new kakao.maps.CustomOverlay({
                            position: userPosition,
                            content: '<div style="width:12px;height:12px;background-color:#3d61f7;border:2px solid white;border-radius:50%;box-shadow:0 0 5px rgba(0,0,0,0.3);transform:translate(-50%,-50%);"></div><div style="font-size:16px; font-weight:bold; color:#1e3a8a; text-shadow:1px 1px 2px white; transform:translate(-50%, -100%); margin-top:-5px;">Me🏃</div>'
                        });
                        currentMeOverlay.setMap(map);
                    },
                    function(error) {
                        console.error("위치 정보를 가져올 수 없습니다:", error);
                    }
                );
            }

            // 장소 검색 기능 설정
            const ps = new kakao.maps.services.Places();  
            let markers = [];
            const infowindow = new kakao.maps.InfoWindow({zIndex:1});

            let currentEmoji = '🚽'; // 검색 테마에 맞춰 변경될 이모지 변수

            // 통합 검색 실행 함수
            function executeSearch(keyword) {
                if (!keyword) {
                    alert('검색어를 입력해주세요!');
                    return;
                }
                
                // 키워드에 따라 아이콘 이모지 자동 변경
                if(keyword.includes('스타벅스')) {
                    currentEmoji = '☕';
                } else if(keyword.includes('상가') || keyword.includes('쇼핑몰') || keyword.includes('빌딩')) {
                    currentEmoji = '🏢';
                } else {
                    currentEmoji = '🚽';
                }

                // 검색어 창 내용 업데이트 (버튼으로 검색했을 때를 위함)
                document.getElementById('searchInput').value = keyword;

                let searchOptions = {};
                if (userPosition) {
                    searchOptions = {
                        location: userPosition, 
                        radius: 2000, 
                        sort: kakao.maps.services.SortBy.DISTANCE 
                    };
                }

                ps.keywordSearch(keyword, placesSearchCB, searchOptions);
            }

            // 직접 검색 버튼 클릭 이벤트
            document.getElementById('searchBtn').addEventListener('click', function() {
                executeSearch(document.getElementById('searchInput').value);
            });

            // 키보드 엔터키를 눌러도 검색되도록 이벤트 추가
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    executeSearch(this.value);
                }
            });

            // 빠른 검색 버튼 이벤트 연동
            document.getElementById('btnToilet').addEventListener('click', function() { executeSearch("공중 화장실"); });
            document.getElementById('btnStarbucks').addEventListener('click', function() { executeSearch("스타벅스"); });
            document.getElementById('btnMall').addEventListener('click', function() { executeSearch("대형 상가 화장실"); });

            // 검색 완료 콜백 함수
            function placesSearchCB(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    displayPlaces(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('주변에 검색 결과가 존재하지 않습니다.');
                } else if (status === kakao.maps.services.Status.ERROR) {
                    alert('검색 결과 중 오류가 발생했습니다.');
                }
            }

            // 결과 표출 함수
            function displayPlaces(places) {
                const listEl = document.getElementById('placesList');
                const bounds = new kakao.maps.LatLngBounds(); 

                removeAllChildNodes(listEl);
                removeMarker();

                for (let i = 0; i < places.length; i++) {
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    
                    // --- 외부 링크 의존 없는, 100% 안전한 SVG 마커 디자인 생성 ---
                    const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="40" viewBox="0 0 36 40">
                        <path fill="#8b4513" d="M18 0C8.1 0 0 8.1 0 18c0 13.5 18 22 18 22s18-8.5 18-22C36 8.1 27.9 0 18 0z"/>
                        <circle fill="#ffffff" cx="18" cy="15" r="9"/>
                    </svg>`;
                    // SVG 코드를 Base64가 아닌 URL 인코딩하여 가볍고 안전하게 처리
                    const customMarkerUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString); 
                    const markerImageSize = new kakao.maps.Size(36, 40); 
                    const markerImageOptions = { offset: new kakao.maps.Point(18, 40) }; 
                    const customMarkerImage = new kakao.maps.MarkerImage(customMarkerUrl, markerImageSize, markerImageOptions);

                    const marker = new kakao.maps.Marker({
                        position : placePosition,
                        image : customMarkerImage // 외부 이미지가 아닌 SVG 코드를 사용하여 절대 깨지지 않음
                    });
                    
                    marker.setMap(map); 
                    markers.push(marker); 
                    
                    const placeName = places[i].place_name;
                    const addressName = places[i].road_address_name || places[i].address_name;
                    const distance = places[i].distance ? places[i].distance + 'm' : ''; 

                    const itemEl = getListItem(placeName, addressName, distance);

                    bounds.extend(placePosition);

                    (function(marker, title, address) {
                        kakao.maps.event.addListener(marker, 'click', function() {
                            displayInfowindow(marker, title, address);
                        });

                        itemEl.onclick = function () {
                            displayInfowindow(marker, title, address);
                            map.panTo(marker.getPosition());
                        };
                    })(marker, placeName, addressName);

                    listEl.appendChild(itemEl);
                }

                if(userPosition) {
                    bounds.extend(userPosition);
                }
                map.setBounds(bounds);
            }

            function removeMarker() {
                for (let i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);
                }
                markers = []; 
            }

            function getListItem(placeName, addressName, distance) {
                const el = document.createElement('li');
                let distanceHtml = distance ? '<span style="color: #d9534f; font-weight: bold; font-size: 12px;">🚶 ' + distance + '</span>' : '';
                
                // 검색 테마에 맞춘 이모지(currentEmoji) 사용
                el.innerHTML = '<strong class="place-name">' + currentEmoji + ' ' + placeName + ' ' + distanceHtml + '</strong>' + 
                               '<span class="place-address">' + addressName + '</span>';
                return el;
            }

            function removeAllChildNodes(el) {
                while (el.hasChildNodes()) {
                    el.removeChild(el.lastChild);
                }
            }

            function displayInfowindow(marker, title, address) {
                const content = '<div class="custom_infowindow">' +
                                '<strong>' + currentEmoji + ' ' + title + '</strong>' +
                                '<span>' + address + '</span>' +
                                '</div>';
                infowindow.setContent(content);
                infowindow.open(map, marker);
            }
        });
    </script>
</body>
</html>
