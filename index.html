<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>급똥구조대 - 안심 화장실 지도</title>
    <style>
        /* 기본 여백을 제거하고 전체 화면을 사용하도록 설정합니다 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #fcf8f0; /* 배경을 따뜻한 미색으로 설정 */
        }

        /* 화면을 좌우로 나누기 위한 전체 컨테이너 (Flexbox 사용) */
        .container {
            display: flex;
            width: 100%;
            height: 100vh; /* 브라우저 화면의 100% 높이 */
        }

        /* --- 왼쪽 패널 (검색창 + 리스트) --- */
        .left-panel {
            width: 320px; /* 왼쪽 패널의 고정 너비 */
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column; /* 내부 요소들을 위에서 아래로 배치 */
            box-shadow: 2px 0 10px rgba(0,0,0,0.05); /* 패널에 살짝 그림자 추가 */
            z-index: 10;
        }

        /* 급똥구조대 타이틀 배너 */
        .header {
            padding: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00); /* 옐로우-오렌지 그라데이션 */
            color: #333;
            text-align: center;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 10px; /* 요소 간 간격 */
        }

        .search-box input {
            flex: 1; /* 남은 가로 공간 차지 */
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px; /* 둥근 모서리 */
            font-size: 14px;
        }

        .search-box button {
            width: 70px;
            padding: 10px;
            background-color: #8b4513; /* 화장실(변)을 상징하는 갈색 */
            color: white;
            border: none;
            border-radius: 8px; /* 둥근 모서리 */
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s; /* 호버 효과 애니메이션 */
        }

        .search-box button:hover {
            background-color: #6a3510; /* 호버 시 더 짙은 갈색 */
        }

        /* 검색 결과가 많아지면 스크롤이 생기도록 설정 */
        .result-list {
            flex: 1; /* 남은 세로 공간을 모두 차지함 */
            overflow-y: auto; 
            padding: 0;
            margin: 0;
            list-style: none; /* 리스트 앞에 붙는 점 제거 */
        }

        .result-list li {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer; /* 마우스를 올렸을 때 클릭 가능한 포인터로 변경 */
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: background-color 0.1s; /* 호버 효과 애니메이션 */
        }

        .result-list li:hover {
            background-color: #f8f9fa; /* 마우스를 올렸을 때 배경색 변경 */
        }

        .place-name {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .place-address {
            font-size: 13px;
            color: #666;
        }

        /* --- 오른쪽 패널 (지도) --- */
        .right-panel {
            flex: 1; /* 가로 공간 중 왼쪽 패널이 쓰고 남은 전체를 차지함 */
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 커스텀 말풍선 스타일 */
        .custom_infowindow {
            padding: 10px;
            z-index: 1;
            min-width: 150px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .custom_infowindow strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #8b4513; /* 제목 갈색 */
        }

        .custom_infowindow span {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="header">
                <h1>🆘 급똥구조대</h1>
                <div style="font-size: 12px; opacity: 0.8; margin-top: 3px;">안심 화장실 지도 🚽💨</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="급해 급해! 주변 화장실 검색" value="공중 화장실">
                <button id="searchBtn">검색</button>
            </div>
            <ul id="placesList" class="result-list">
                <li style="text-align: center; color: #888; font-size: 14px; padding-top: 30px;">
                    위치 권한 허용 후 '검색' 버튼을 눌러보세요!
                </li>
            </ul>
        </div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=076e642420d63b83b006244cd3293772&libraries=services"></script>

    <script>
        // 지도가 완전히 로드된 후에 코드가 실행되도록 감쌉니다. (로딩 오류 방지)
        kakao.maps.load(function() {
            
            // 1. 지도를 표시할 HTML 요소를 가져옵니다.
            const mapContainer = document.getElementById('map'); 
            
            // 2. 지도의 기본 옵션을 설정합니다.
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 임시 초기 위치 (서울시청)
                level: 5 // 요청하신 지도 확대 레벨 5
            };  

            // 3. 지도를 생성합니다.
            const map = new kakao.maps.Map(mapContainer, mapOptions); 

            // 현재 위치에 표시할 오버레이 객체들
            let currentLocationMarker; // 사용자의 정확도 원 (Circle)
            let currentMeOverlay; // 나를 나타내는 작은 점 (CustomOverlay)

            // 4. 사용자의 현재 위치 권한을 요청하고 지도를 이동시킵니다.
            if (navigator.geolocation) {
                // GeoLocation을 이용해서 접속 위치를 얻어옵니다.
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // 사용자의 현재 위도와 경도
                        const lat = position.coords.latitude; 
                        const lon = position.coords.longitude; 
                        const currentPosition = new kakao.maps.LatLng(lat, lon);

                        // 지도의 중심을 현재 위치로 부드럽게 이동시킵니다.
                        map.setCenter(currentPosition);

                        // --- 사용자의 현재 위치 오버레이 생성 (푸른색 원 + 점) ---
                        // 사용자 주변에 정확도 원 표시
                        currentLocationMarker = new kakao.maps.Circle({
                            center: currentPosition,
                            radius: 100, // 미터 단위 반경
                            strokeWeight: 1, // 선의 두께
                            strokeColor: '#3d61f7', // 파란색 선
                            strokeOpacity: 0.5,
                            fillColor: '#3d61f7', // 파란색 채우기
                            fillOpacity: 0.1 // 아주 연하게
                        });
                        currentLocationMarker.setMap(map);

                        // 나를 나타내는 작은 점 커스텀 오버레이 표시
                        currentMeOverlay = new kakao.maps.CustomOverlay({
                            position: currentPosition,
                            content: '<div style="width:10px;height:10px;background-color:#3d61f7;border:2px solid white;border-radius:50%;box-shadow:0 0 5px rgba(0,0,0,0.3);transform:translate(-50%,-50%);"></div><div style="font-size:16px; transform:translate(-50%, -100%); margin-top:-5px;">Me 🏃</div>'
                        });
                        currentMeOverlay.setMap(map);
                    },
                    function(error) {
                        // 사용자가 위치 권한을 거부하거나 오류가 났을 때
                        console.error("위치 정보를 가져올 수 없습니다:", error);
                        alert("위치 권한을 허용하지 않아 기본 위치로 표시됩니다.");
                    }
                );
            } else {
                alert("현재 브라우저에서는 위치 정보를 지원하지 않습니다.");
            }

            // --- 추가된 장소 검색 기능 코드 시작 ---

            // 장소 검색 객체를 생성합니다
            const ps = new kakao.maps.services.Places();  

            // 검색 결과 마커들을 담을 배열입니다
            let markers = [];

            // 검색 결과 마커를 클릭했을 때 팝업을 띄울 인포윈도우 객체입니다
            // 테마에 맞게 약간 둥근 디자인으로 변경
            const infowindow = new kakao.maps.InfoWindow({zIndex:1});

            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');

            // 검색 버튼 클릭 이벤트 리스너 등록
            searchBtn.addEventListener('click', function() {
                const keyword = searchInput.value;
                if (!keyword) {
                    alert('검색어를 입력해주세요!');
                    return;
                }
                
                // 키워드로 장소검색을 요청합니다
                ps.keywordSearch(keyword, placesSearchCB);
            });

            // 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
            function placesSearchCB(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    // 정상적으로 검색이 완료됐으면 검색 목록과 마커를 표출합니다
                    displayPlaces(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('검색 결과가 존재하지 않습니다.');
                    return;
                } else if (status === kakao.maps.services.Status.ERROR) {
                    alert('검색 결과 중 오류가 발생했습니다.');
                    return;
                }
            }

            // 검색 결과 목록과 마커를 표출하는 함수입니다
            function displayPlaces(places) {
                const listEl = document.getElementById('placesList');
                const bounds = new kakao.maps.LatLngBounds(); // 검색 결과에 맞춰 지도 범위를 재설정하기 위한 객체

                // 검색 결과 목록에 추가된 항목들을 모두 제거합니다
                removeAllChildNodes(listEl);

                // 지도에 표시되고 있는 기존 마커들을 모두 제거합니다
                removeMarker();

                for (let i = 0; i < places.length; i++) {
                    // 마커를 생성하고 지도에 표시합니다
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    
                    // --- 검색 결과 마커를 갈색 핀 디자인으로 변경 ---
                    // 카카오맵 API 기본 갈색 핀 마커 이미지 URL
                    const brownMarkerImageUrl = '//t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_brown.png'; 
                    const markerImageSize = new kakao.maps.Size(37, 42); // 마커 이미지의 크기
                    const markerImageOptions = {
                        offset: new kakao.maps.Point(13, 37) // 마커 이미지 안의 기준 좌표
                    };
                    const toiletMarkerImage = new kakao.maps.MarkerImage(brownMarkerImageUrl, markerImageSize, markerImageOptions);

                    // 마커 생성 시 이미지 옵션 추가
                    const marker = new kakao.maps.Marker({
                        position : placePosition,
                        image : toiletMarkerImage
                    });
                    marker.setMap(map); // 지도 위에 마커를 표출합니다
                    markers.push(marker); // 배열에 생성된 마커를 추가하여 나중에 지울 수 있게 합니다
                    
                    // 장소 이름과 주소 정보를 변수에 담습니다 (도로명 주소가 없으면 지번 주소 사용)
                    const placeName = places[i].place_name;
                    const addressName = places[i].road_address_name || places[i].address_name;

                    // 검색 결과 항목(li) Element를 생성합니다
                    const itemEl = getListItem(placeName, addressName);

                    // 지도 범위를 설정하기 위해 객체에 좌표를 추가합니다
                    bounds.extend(placePosition);

                    // 마커와 검색결과 항목에 클릭 이벤트를 등록합니다
                    (function(marker, title, address) {
                        // 마커를 클릭했을 때 팝업 표시
                        kakao.maps.event.addListener(marker, 'click', function() {
                            displayInfowindow(marker, title, address);
                        });

                        // 왼쪽 리스트 항목을 클릭했을 때도 팝업을 표시하고 마커 위치로 이동
                        itemEl.onclick = function () {
                            displayInfowindow(marker, title, address);
                            map.panTo(marker.getPosition());
                        };
                    })(marker, placeName, addressName);

                    // 생성된 항목을 리스트에 추가합니다
                    listEl.appendChild(itemEl);
                }

                // 검색된 모든 장소가 보이도록 지도의 범위를 재설정합니다
                map.setBounds(bounds);
            }

            // 지도 위에 표시되고 있는 기존 마커를 모두 제거하는 함수입니다
            function removeMarker() {
                for (let i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);
                }
                markers = []; // 배열을 초기화합니다
            }

            // 검색결과 항목을 HTML Element로 반환하는 함수입니다
            function getListItem(placeName, addressName) {
                const el = document.createElement('li');
                el.innerHTML = '<strong class="place-name">🚽 ' + placeName + '</strong>' + 
                               '<span class="place-address">' + addressName + '</span>';
                return el;
            }

            // 검색결과 목록의 자식 Element를 모두 제거하는 함수입니다
            function removeAllChildNodes(el) {
                while (el.hasChildNodes()) {
                    el.removeChild(el.lastChild);
                }
            }

            // 마커를 클릭했을 때 호출되는 함수입니다. 인포윈도우에 장소명과 주소를 표시합니다
            // 깔끔한 커스텀 스타일로 인포윈도우 내용을 구성
            function displayInfowindow(marker, title, address) {
                const content = '<div class="custom_infowindow">' +
                                '<strong>🚽 ' + title + '</strong>' +
                                '<span>' + address + '</span>' +
                                '</div>';
                infowindow.setContent(content);
                infowindow.open(map, marker);
            }
        });
    </script>
</body>
</html>
