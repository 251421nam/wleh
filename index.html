<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장소 검색 서비스</title>
    <style>
        /* 기본 여백을 제거하고 전체 화면을 사용하도록 설정합니다 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 화면을 좌우로 나누기 위한 전체 컨테이너 (Flexbox 사용) */
        .container {
            display: flex;
            width: 100%;
            height: 100vh; /* 브라우저 화면의 100% 높이 */
        }

        /* --- 왼쪽 패널 (검색창 + 리스트) --- */
        .left-panel {
            width: 300px; /* 왼쪽 패널의 고정 너비 */
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column; /* 내부 요소들을 위에서 아래로 배치 */
        }

        .search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .search-box input {
            width: calc(100% - 65px);
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        .search-box button {
            width: 50px;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 검색 결과가 많아지면 스크롤이 생기도록 설정 */
        .result-list {
            flex: 1; /* 남은 세로 공간을 모두 차지함 */
            overflow-y: auto; 
            padding: 15px;
            margin: 0;
            list-style: none; /* 리스트 앞에 붙는 점 제거 */
        }

        .result-list li {
            padding: 10px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer; /* 마우스를 올렸을 때 클릭 가능한 포인터로 변경 */
        }

        .result-list li:hover {
            background-color: #e2e6ea; /* 마우스를 올렸을 때 배경색 변경 */
        }

        /* --- 오른쪽 패널 (지도) --- */
        .right-panel {
            flex: 1; /* 가로 공간 중 왼쪽 패널이 쓰고 남은 전체를 차지함 */
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="장소 검색">
                <button id="searchBtn">검색</button>
            </div>
            <ul id="placesList" class="result-list">
                <li>검색 결과가 이곳에 표시될 예정입니다.</li>
            </ul>
        </div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=076e642420d63b83b006244cd3293772&libraries=services"></script>

    <script>
        // 지도가 완전히 로드된 후에 코드가 실행되도록 감쌉니다. (로딩 오류 방지)
        kakao.maps.load(function() {
            
            // 1. 지도를 표시할 HTML 요소를 가져옵니다.
            const mapContainer = document.getElementById('map'); 
            
            // 2. 지도의 기본 옵션을 설정합니다.
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 임시 초기 위치 (서울시청)
                level: 5 // 요청하신 지도 확대 레벨 5
            };  

            // 3. 지도를 생성합니다.
            const map = new kakao.maps.Map(mapContainer, mapOptions); 

            // 현재 위치에 표시할 마커 변수
            let currentLocationMarker;

            // 4. 사용자의 현재 위치 권한을 요청하고 지도를 이동시킵니다.
            if (navigator.geolocation) {
                // GeoLocation을 이용해서 접속 위치를 얻어옵니다.
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // 사용자의 현재 위도와 경도
                        const lat = position.coords.latitude; 
                        const lon = position.coords.longitude; 
                        
                        // 마커가 표시될 좌표 객체 생성
                        const currentPosition = new kakao.maps.LatLng(lat, lon);
                        
                        // 현재 위치에 마커 생성 및 지도에 표시
                        currentLocationMarker = new kakao.maps.Marker({  
                            map: map, 
                            position: currentPosition
                        }); 
                        
                        // 지도의 중심을 현재 위치로 부드럽게 이동시킵니다.
                        map.setCenter(currentPosition);
                    },
                    function(error) {
                        // 사용자가 위치 권한을 거부하거나 오류가 났을 때
                        console.error("위치 정보를 가져올 수 없습니다:", error);
                        alert("위치 권한을 허용하지 않아 기본 위치로 표시됩니다.");
                    }
                );
            } else {
                alert("현재 브라우저에서는 위치 정보를 지원하지 않습니다.");
            }

            // --- 추가된 장소 검색 기능 코드 시작 ---

            // 장소 검색 객체를 생성합니다
            const ps = new kakao.maps.services.Places();  

            // 검색 결과 마커들을 담을 배열입니다
            let markers = [];

            // 검색 결과 마커를 클릭했을 때 팝업을 띄울 인포윈도우 객체입니다
            const infowindow = new kakao.maps.InfoWindow({zIndex:1});

            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');

            // 검색 버튼 클릭 이벤트 리스너 등록
            searchBtn.addEventListener('click', function() {
                const keyword = searchInput.value;
                if (!keyword) {
                    alert('검색어를 입력해주세요!');
                    return;
                }
                
                // 키워드로 장소검색을 요청합니다
                ps.keywordSearch(keyword, placesSearchCB);
            });

            // 장소검색이 완료됐을 때 호출되는 콜백함수 입니다
            function placesSearchCB(data, status, pagination) {
                if (status === kakao.maps.services.Status.OK) {
                    // 정상적으로 검색이 완료됐으면 검색 목록과 마커를 표출합니다
                    displayPlaces(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('검색 결과가 존재하지 않습니다.');
                    return;
                } else if (status === kakao.maps.services.Status.ERROR) {
                    alert('검색 결과 중 오류가 발생했습니다.');
                    return;
                }
            }

            // 검색 결과 목록과 마커를 표출하는 함수입니다
            function displayPlaces(places) {
                const listEl = document.getElementById('placesList');
                const bounds = new kakao.maps.LatLngBounds(); // 검색 결과에 맞춰 지도 범위를 재설정하기 위한 객체

                // 검색 결과 목록에 추가된 항목들을 모두 제거합니다
                removeAllChildNodes(listEl);

                // 지도에 표시되고 있는 기존 마커들을 모두 제거합니다
                removeMarker();

                for (let i = 0; i < places.length; i++) {
                    // 마커를 생성하고 지도에 표시합니다
                    const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                    const marker = addMarker(placePosition);
                    
                    // 장소 이름과 주소 정보를 변수에 담습니다 (도로명 주소가 없으면 지번 주소 사용)
                    const placeName = places[i].place_name;
                    const addressName = places[i].road_address_name || places[i].address_name;

                    // 검색 결과 항목(li) Element를 생성합니다
                    const itemEl = getListItem(placeName, addressName);

                    // 지도 범위를 설정하기 위해 객체에 좌표를 추가합니다
                    bounds.extend(placePosition);

                    // 마커와 검색결과 항목에 클릭 이벤트를 등록합니다
                    (function(marker, title, address) {
                        // 마커를 클릭했을 때 팝업 표시
                        kakao.maps.event.addListener(marker, 'click', function() {
                            displayInfowindow(marker, title, address);
                        });

                        // 왼쪽 리스트 항목을 클릭했을 때도 팝업을 표시하고 마커 위치로 이동
                        itemEl.onclick = function () {
                            displayInfowindow(marker, title, address);
                            map.panTo(marker.getPosition());
                        };
                    })(marker, placeName, addressName);

                    // 생성된 항목을 리스트에 추가합니다
                    listEl.appendChild(itemEl);
                }

                // 검색된 모든 장소가 보이도록 지도의 범위를 재설정합니다
                map.setBounds(bounds);
            }

            // 마커를 생성하고 지도 위에 마커를 표시하는 함수입니다
            function addMarker(position) {
                const marker = new kakao.maps.Marker({
                    position: position
                });

                marker.setMap(map); // 지도 위에 마커를 표출합니다
                markers.push(marker); // 배열에 생성된 마커를 추가하여 나중에 지울 수 있게 합니다

                return marker;
            }

            // 지도 위에 표시되고 있는 기존 마커를 모두 제거하는 함수입니다
            function removeMarker() {
                for (let i = 0; i < markers.length; i++) {
                    markers[i].setMap(null);
                }
                markers = []; // 배열을 초기화합니다
            }

            // 검색결과 항목을 HTML Element로 반환하는 함수입니다
            function getListItem(placeName, addressName) {
                const el = document.createElement('li');
                el.innerHTML = '<strong>' + placeName + '</strong><br>' + 
                               '<span style="font-size: 12px; color: #666;">' + addressName + '</span>';
                return el;
            }

            // 검색결과 목록의 자식 Element를 모두 제거하는 함수입니다
            function removeAllChildNodes(el) {
                while (el.hasChildNodes()) {
                    el.removeChild(el.lastChild);
                }
            }

            // 마커를 클릭했을 때 호출되는 함수입니다. 인포윈도우에 장소명과 주소를 표시합니다
            function displayInfowindow(marker, title, address) {
                const content = '<div style="padding:10px;z-index:1;min-width:150px;border-radius:4px;">' +
                                '<strong style="display:block;margin-bottom:5px;font-size:14px;">' + title + '</strong>' +
                                '<span style="font-size:12px;color:#555;">' + address + '</span>' +
                                '</div>';
                infowindow.setContent(content);
                infowindow.open(map, marker);
            }
        });
    </script>
</body>
</html>
