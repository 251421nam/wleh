<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장소 검색 서비스</title>
    <style>
        /* 기본 여백을 제거하고 전체 화면을 사용하도록 설정합니다 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        /* 화면을 좌우로 나누기 위한 전체 컨테이너 (Flexbox 사용) */
        .container {
            display: flex;
            width: 100%;
            height: 100vh; /* 브라우저 화면의 100% 높이 */
        }

        /* --- 왼쪽 패널 (검색창 + 리스트) --- */
        .left-panel {
            width: 300px; /* 왼쪽 패널의 고정 너비 */
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column; /* 내부 요소들을 위에서 아래로 배치 */
        }

        .search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .search-box input {
            width: calc(100% - 65px);
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }

        .search-box button {
            width: 50px;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 검색 결과가 많아지면 스크롤이 생기도록 설정 */
        .result-list {
            flex: 1; /* 남은 세로 공간을 모두 차지함 */
            overflow-y: auto; 
            padding: 15px;
            margin: 0;
            list-style: none; /* 리스트 앞에 붙는 점 제거 */
        }

        .result-list li {
            padding: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        /* --- 오른쪽 패널 (지도) --- */
        .right-panel {
            flex: 1; /* 가로 공간 중 왼쪽 패널이 쓰고 남은 전체를 차지함 */
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 패널: 검색 UI -->
        <div class="left-panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="장소 검색">
                <button id="searchBtn">검색</button>
            </div>
            <ul id="placesList" class="result-list">
                <li>검색 결과가 이곳에 표시될 예정입니다.</li>
            </ul>
        </div>

        <!-- 오른쪽 패널: 카카오맵 -->
        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <!-- 카카오맵 API 스크립트 로드 (장소 검색을 위해 libraries=services 추가) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=076e642420d63b83b006244cd3293772&libraries=services"></script>

    <script>
        // 지도가 완전히 로드된 후에 코드가 실행되도록 감쌉니다. (로딩 오류 방지)
        kakao.maps.load(function() {
            
            // 1. 지도를 표시할 HTML 요소를 가져옵니다.
            const mapContainer = document.getElementById('map'); 
            
            // 2. 지도의 기본 옵션을 설정합니다.
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 임시 초기 위치 (서울시청)
                level: 5 // 요청하신 지도 확대 레벨 5
            };  

            // 3. 지도를 생성합니다.
            const map = new kakao.maps.Map(mapContainer, mapOptions); 

            // 현재 위치에 표시할 마커 변수
            let currentLocationMarker;

            // 4. 사용자의 현재 위치 권한을 요청하고 지도를 이동시킵니다.
            if (navigator.geolocation) {
                // GeoLocation을 이용해서 접속 위치를 얻어옵니다.
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // 사용자의 현재 위도와 경도
                        const lat = position.coords.latitude; 
                        const lon = position.coords.longitude; 
                        
                        // 마커가 표시될 좌표 객체 생성
                        const currentPosition = new kakao.maps.LatLng(lat, lon);
                        
                        // 현재 위치에 마커 생성 및 지도에 표시
                        currentLocationMarker = new kakao.maps.Marker({  
                            map: map, 
                            position: currentPosition
                        }); 
                        
                        // 지도의 중심을 현재 위치로 부드럽게 이동시킵니다.
                        map.setCenter(currentPosition);
                    },
                    function(error) {
                        // 사용자가 위치 권한을 거부하거나 오류가 났을 때
                        console.error("위치 정보를 가져올 수 없습니다:", error);
                        alert("위치 권한을 허용하지 않아 기본 위치로 표시됩니다.");
                    }
                );
            } else {
                alert("현재 브라우저에서는 위치 정보를 지원하지 않습니다.");
            }

            // (참고용) 나중에 추가할 검색 버튼 클릭 이벤트의 기본 틀입니다.
            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');

            searchBtn.addEventListener('click', function() {
                const keyword = searchInput.value;
                if (!keyword) {
                    alert('검색어를 입력해주세요!');
                    return;
                }
                console.log("입력된 검색어:", keyword);
                // 여기에 장소 검색 API 호출 코드를 작성해 나가시면 됩니다!
            });
        });
    </script>
</body>
</html>
